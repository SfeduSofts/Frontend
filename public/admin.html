<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админка проектов</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="search-block">
            <label class="visually-hidden" for="searchInput"
              >Поиск по имени проекта</label
            >
            <input
              id="searchInput"
              class="search-input"
              type="search"
              placeholder="Поиск"
              autocomplete="off"
            />
          </div>
          <div class="filters-section">
            <div class="filters-group">
              <div class="filters-group-buttons">
                <button
                  class="filter-button"
                  data-filter-type="type"
                  data-value="МП1"
                >
                  МП1
                </button>
                <button
                  class="filter-button"
                  data-filter-type="type"
                  data-value="МП2"
                >
                  МП2
                </button>
              </div>
            </div>
            <div class="years-block">
              <div class="years-list">
                <button
                  class="filter-button"
                  data-filter-type="year"
                  data-value="2024–2025"
                >
                  2024–2025
                </button>
                <button
                  class="filter-button"
                  data-filter-type="year"
                  data-value="2025–2026"
                >
                  2025–2026
                </button>
                <button
                  class="filter-button"
                  data-filter-type="year"
                  data-value="2026–2027"
                >
                  2026–2027
                </button>
                <button
                  class="filter-button"
                  data-filter-type="year"
                  data-value="2027–2028"
                >
                  2027–2028
                </button>
              </div>
            </div>
            <button
              class="reset-filters-button"
              id="resetFiltersButton"
              type="button"
            >
              Сбросить фильтры
            </button>
            <div class="admin-import-controls">
              <button
                class="reset-filters-button admin-bulk-delete-button admin-hidden"
                id="adminBulkDeleteButton"
                type="button"
                disabled
              >
                Удалить выбранные
              </button>
              <input
                id="adminImportSheetUrl"
                class="search-input admin-import-input"
                type="url"
                placeholder="https://docs.google.com/spreadsheets/d/.../edit#gid=..."
                autocomplete="off"
              />
              <button
                class="reset-filters-button admin-import-button"
                id="adminImportSheetButton"
                type="button"
              >
                Импорт из таблицы
              </button>
              <div id="adminImportSheetStatus" class="admin-import-status"></div>
            </div>
          </div>
        </div>
      </aside>
      <main class="main">
        <section class="cards-section">
          <div class="cards-grid" id="cardsContainer"></div>
        </section>
      </main>
    </div>
    <div class="project-modal-backdrop" id="projectModal" aria-hidden="true">
      <div
        class="project-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="projectModalTitle"
      >
        <div class="project-modal__content">
          <h2 class="project-modal__title" id="projectModalTitle">
            <input
              id="adminProjectName"
              class="admin-input admin-title-input"
              type="text"
              placeholder="Название проекта"
            />
          </h2>

          <div class="admin-field-grid">
            <label class="admin-field">
              <span class="admin-label">Тип</span>
              <select id="adminProjectType" class="admin-input">
                <option value="МП1">МП1</option>
                <option value="МП2">МП2</option>
              </select>
            </label>
            <label class="admin-field">
              <span class="admin-label">Год</span>
              <input
                id="adminProjectYear"
                class="admin-input"
                type="number"
                placeholder="2025"
              />
            </label>
            <label class="admin-field">
              <span class="admin-label">Наставник</span>
              <input
                id="adminProjectMentor"
                class="admin-input"
                type="text"
                placeholder="ФИО"
              />
            </label>
            <label class="admin-field admin-field--checkbox">
              <span class="admin-label">Защищенный проект</span>
              <input id="adminProjectProtected" class="admin-checkbox" type="checkbox" />
            </label>
          </div>

          <label class="admin-field admin-field--full">
            <span class="admin-label">Короткое описание (карточка)</span>
            <textarea
              id="adminProjectShortDescription"
              class="admin-textarea"
              rows="2"
            ></textarea>
          </label>

          <div class="project-modal__layout">
            <div class="project-modal__main">
              <div class="project-modal__image-wrapper">
                <img
                  id="projectModalImage"
                  class="project-modal__image"
                  src=""
                  alt=""
                />
              </div>

              <label class="admin-field admin-field--full">
                <span class="admin-label">Полное описание</span>
                <textarea
                  id="projectModalDescription"
                  class="admin-textarea"
                  rows="4"
                ></textarea>
              </label>

              <div class="admin-file-grid">
                <div class="admin-field admin-field--full">
                  <span
                    id="adminProjectPhotoStatus"
                    class="admin-label admin-file-status"
                  ></span>
                  <input
                    id="adminProjectPhotoFile"
                    class="admin-file-input-hidden"
                    type="file"
                    accept="image/*"
                  />
                  <button
                    id="adminProjectPhotoAction"
                    class="admin-small-button"
                    type="button"
                  >
                    Выберите файл
                  </button>
                </div>

                <div class="admin-field admin-field--full">
                  <span
                    id="adminProjectPDFStatus"
                    class="admin-label admin-file-status"
                  ></span>
                  <input
                    id="adminProjectPdfFile"
                    class="admin-file-input-hidden"
                    type="file"
                    accept="application/pdf"
                  />
                  <button
                    id="adminProjectPdfAction"
                    class="admin-small-button"
                    type="button"
                  >
                    Выберите файл
                  </button>
                </div>
              </div>

              <a
                id="projectModalPdf"
                class="project-modal__pdf-link"
                href="#"
                target="_blank"
                rel="noopener"
              >
                Открыть PDF проекта
              </a>
            </div>

            <aside class="project-modal__team">
              <h3 class="project-modal__team-title">
                Команды
                <input
                  id="adminProjectTeamNames"
                  class="admin-input admin-team-input"
                  type="text"
                  placeholder="Команда A, Команда B"
                />
              </h3>
              <ul
                id="projectModalStudents"
                class="project-modal__students-list"
              ></ul>
            </aside>
          </div>

        </div>
        <div class="admin-modal-actions">
          <button
            class="admin-button admin-button--delete"
            id="adminDeleteButton"
            type="button"
          >
            Удалить проект
          </button>
          <button
            class="admin-button admin-button--save"
            id="adminSaveButton"
            type="button"
          >
            Сохранить
          </button>
          <button
            class="admin-button admin-button--cancel"
            id="adminCancelButton"
            type="button"
          >
            Отмена
          </button>
        </div>
      </div>
    </div>
    <script src="data-store.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
